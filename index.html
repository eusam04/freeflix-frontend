<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freeflix</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <main>
        <header>
            <nav class="navbar">
                <img class="logo" src="assets/logo-freeflix.png" alt="Logo do Freeflix">
            </nav>
            <button id="theme-toggle" type="button" aria-label="Alternar tema claro/escuro">Ativar modo claro</button>
            <h1>Quem está assistindo?</h1>
        </header>

        <section class="profiles" aria-label="Seleção de perfis">
            <ol class="profiles-ordered">
                <li>
                    <ul class="profiles-unordered">
                        <li>
                            <a href="catalogo/catalogo.html" class="perfil-1">
                                <article class="profile">
                                    <figure>
                                        <img src="assets/perfil-1.png" alt="Ícone de perfil em estilo arte vetorial 
                                     minimalista apresentando uma jovem de cabelos roxos curtos, óculos de sol pretos
                                     e brincos de argola dourados, sobre um fundo ciano vibrante.">
                                        <figcaption>Sam</figcaption>
                                    </figure>
                                </article>
                            </a>
                        </li>
                        <li>
                            <a href="catalogo/catalogo.html" class="perfil-2">
                                <article class="profile">
                                    <figure>
                                        <img src="assets/perfil-2.png" alt="Ilustração vetorial minimalista de um jovem de cabelos 
                                    castanhos espetados, usando fones de ouvido azuis e um moletom laranja, sobre um fundo laranja 
                                    vibrante.">
                                        <figcaption>John</figcaption>
                                    </figure>
                                </article>
                            </a>
                        </li>
                        <li>
                            <a href="catalogo/catalogo.html" class="perfil-3">
                                <article class="profile">
                                    <figure>
                                        <img src="assets/perfil-3.png"
                                            alt="Ilustração vetorial de uma jovem com cabelos trançados, 
                                    usando uma jaqueta amarela e pequenos brincos dourados, sobre um fundo azul vibrante.">
                                        <figcaption>Maya</figcaption>
                                    </figure>
                                </article>
                            </a>
                        </li>
                    </ul>
                </li>
            </ol>
        </section>
    </main>
</body>

</html>
